<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Buddy - AI英会話ぬいぐるみ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .teddy-bear {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        @keyframes bounce {
            0%, 100% { 
                transform: translateY(0) rotate(-5deg); 
            }
            50% { 
                transform: translateY(-20px) rotate(5deg); 
            }
        }

        .title {
            color: white;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .api-key-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .api-key-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .api-key-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: monospace;
        }

        .save-key-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-key-button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .talk-button {
            font-size: 20px;
            padding: 20px 40px;
            border-radius: 50px;
            border: none;
            background: white;
            color: #667eea;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            min-width: 200px;
        }

        .talk-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .talk-button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .talk-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .talk-button.listening {
            background: #ff6b6b;
            color: white;
            animation: pulse 1.5s infinite;
        }

        .talk-button.speaking {
            background: #51cf66;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
            }
            50% { 
                transform: scale(1.05); 
            }
        }

        .conversation {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .message {
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: left;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .ai-message {
            background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
        }

        .label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .text {
            font-size: 18px;
            color: #333;
            line-height: 1.5;
        }

        .reset-button {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            background: white;
            color: #667eea;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .teddy-bear {
                font-size: 80px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .talk-button {
                font-size: 18px;
                padding: 18px 35px;
            }
            
            .text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="container">
            <div class="teddy-bear">🧸</div>
            <h1 class="title">English Buddy</h1>

            <div id="apiKeySection" class="api-key-section">
                <h3>🔑 Google Gemini APIキーを入力</h3>
                <input 
                    type="password" 
                    id="apiKeyInput" 
                    class="api-key-input" 
                    placeholder="AIza..."
                >
                <button class="save-key-button" onclick="saveApiKey()">保存して開始</button>
                <p style="color: #666; font-size: 12px; margin-top: 10px;">
                    ※ APIキーは <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #667eea;">Google AI Studio</a> で取得できます
                </p>
            </div>

            <div id="mainApp" class="hidden">
                <div id="errorMessage" class="error-message hidden"></div>

                <button 
                    id="talkButton"
                    onclick="startListening()" 
                    class="talk-button"
                >
                    🎤 Tap to Talk
                </button>

                <div id="conversation" class="conversation"></div>

                <button id="resetButton" class="reset-button hidden" onclick="resetConversation()">
                    🔄 New Conversation
                </button>

                <div class="instructions">
                    <p>📱 スマホをぬいぐるみのポケットに入れて使ってね！</p>
                    <p>🎤 ボタンを押して英語で話しかけよう</p>
                    <p>💡 Chrome または Edge ブラウザを使ってください</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GEMINI_API_KEY = '';
        let conversationHistory = [];
        let isListening = false;
        let isSpeaking = false;

        function saveApiKey() {
            const input = document.getElementById('apiKeyInput');
            const key = input.value.trim();

            if (!key) {
                showError('APIキーを入力してください');
                return;
            }

            if (!key.startsWith('AIza')) {
                showError('正しいAPIキー形式ではありません（AIzaで始まる必要があります）');
                return;
            }

            GEMINI_API_KEY = key;
            localStorage.setItem('gemini_api_key', key);

            document.getElementById('apiKeySection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                GEMINI_API_KEY = savedKey;
                document.getElementById('apiKeySection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        function updateButtonState(state) {
            const button = document.getElementById('talkButton');
            button.className = 'talk-button';
            
            if (state === 'listening') {
                isListening = true;
                button.classList.add('listening');
                button.textContent = '🎤 Listening...';
                button.disabled = true;
            } else if (state === 'speaking') {
                isSpeaking = true;
                button.classList.add('speaking');
                button.textContent = '🔊 Speaking...';
                button.disabled = true;
            } else {
                isListening = false;
                isSpeaking = false;
                button.textContent = '🎤 Tap to Talk';
                button.disabled = false;
            }
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showError('このブラウザは音声認識に対応していません。ChromeまたはEdgeを使用してください。');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                updateButtonState('listening');
                console.log('音声認識開始');
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                console.log('認識されたテキスト:', text);
                
                addMessage('user', text);
                await getAIResponse(text);
            };

            recognition.onerror = (event) => {
                console.error('音声認識エラー:', event.error);
                updateButtonState('idle');
                
                if (event.error === 'no-speech') {
                    showError('音声が聞こえませんでした。もう一度お試しください。');
                } else if (event.error === 'not-allowed') {
                    showError('マイクの許可が必要です。ブラウザの設定を確認してください。');
                } else {
                    showError('音声認識エラー: ' + event.error);
                }
            };

            recognition.onend = () => {
                if (isListening) {
                    updateButtonState('idle');
                }
                console.log('音声認識終了');
            };

            recognition.start();
        }

        function addMessage(type, text) {
            const conversation = document.getElementById('conversation');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            const label = type === 'user' ? 'You said:' : 'Teddy says:';
            
            messageDiv.innerHTML = `
                <div class="label">${label}</div>
                <div class="text">${text}</div>
            `;
            
            conversation.appendChild(messageDiv);
            conversation.scrollTop = conversation.scrollHeight;

            document.getElementById('resetButton').classList.remove('hidden');
        }

        async function getAIResponse(userMessage) {
            try {
                updateButtonState('speaking');

                const messages = [
                    ...conversationHistory,
                    { role: 'user', content: userMessage }
                ];

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        apiKey: GEMINI_API_KEY,
                        system: `You are a friendly, encouraging English teacher teddy bear helping a Japanese child learn English. 

Rules:
- Keep responses very short (1-2 sentences maximum)
- Use simple, basic English words
- Be warm and encouraging
- Ask simple follow-up questions sometimes
- Praise their efforts
- If they make a mistake, gently correct by repeating correctly
- Use child-friendly topics: animals, colors, food, family, toys`,
                        messages: messages.slice(-6)
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API Error: ${response.status} - ${errorData.error?.message || 'Unknown error'}`);
                }

                const data = await response.json();
                const aiResponse = data.content[0].text;
                
                console.log('AI応答:', aiResponse);

                addMessage('ai', aiResponse);

                conversationHistory.push(
                    { role: 'user', content: userMessage },
                    { role: 'assistant', content: aiResponse }
                );

                speak(aiResponse);

            } catch (error) {
                console.error('API呼び出しエラー:', error);
                showError('エラーが発生しました: ' + error.message);
                updateButtonState('idle');
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.pitch = 1.2;
            utterance.volume = 1.0;

            utterance.onend = () => {
                updateButtonState('idle');
                console.log('音声再生終了');
            };

            utterance.onerror = (event) => {
                console.error('音声合成エラー:', event);
                updateButtonState('idle');
            };

            window.speechSynthesis.speak(utterance);
        }

        function resetConversation() {
            conversationHistory = [];
            document.getElementById('conversation').innerHTML = '';
            document.getElementById('resetButton').classList.add('hidden');
            window.speechSynthesis.cancel();
            updateButtonState('idle');
        }
    </script>
</body>
</html>
